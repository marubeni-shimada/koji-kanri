<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工事書類管理システム</title>
<!-- MSAL.js (Microsoft 認証) - ローカル同梱版 -->
<script src="./msal-browser.min.js"></script>
<!-- PDF.js (PDFプレビュー) - ローカル同梱版 -->
<script src="./libs/pdf.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --primary: #1F4E79;
    --primary-light: #2E74B5;
    --primary-dark: #143A5C;
    --bg-page: #F5F5F3;
    --bg-card: #FFFFFF;
    --bg-secondary: #F9F9F7;
    --text-primary: #1F1F1E;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: #E5E5E0;
    --border-strong: #B4B2A9;
    --success-bg: #EAF3DE;
    --success-fg: #173404;
    --warning-bg: #FAEEDA;
    --warning-fg: #412402;
    --danger-bg: #FCEBEB;
    --danger-fg: #501313;
    --neutral-bg: #F1EFE8;
    --neutral-fg: #2C2C2A;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.12);
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", "Segoe UI", sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
  }
  
  /* === 起動中オーバーレイ === */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-page);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    gap: 16px;
  }
  .loading-overlay.hidden { display: none; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .loading-text {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .loading-error {
    background: var(--danger-bg);
    color: var(--danger-fg);
    padding: 16px 24px;
    border-radius: 8px;
    max-width: 500px;
    font-size: 13px;
    line-height: 1.6;
    text-align: left;
  }
  .loading-error h3 { font-size: 14px; margin-bottom: 8px; }
  .loading-error pre {
    font-size: 11px;
    margin-top: 8px;
    padding: 8px;
    background: rgba(255,255,255,0.5);
    border-radius: 4px;
    overflow-x: auto;
    white-space: pre-wrap;
  }
  .retry-btn {
    padding: 8px 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  
  /* === ヘッダー === */
  .topbar {
    background: var(--primary);
    color: white;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow);
  }
  .topbar h1 { font-size: 16px; font-weight: 500; }
  .topbar .subtitle { font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .user-info {
    font-size: 12px;
    opacity: 0.85;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  /* === メインコンテナ === */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 20px;
  }
  
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .page-title { font-size: 20px; font-weight: 500; }
  .page-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  
  .btn-primary {
    padding: 8px 16px;
    font-size: 13px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled {
    background: var(--text-tertiary);
    cursor: not-allowed;
  }
  
  .btn-ghost {
    padding: 6px 12px;
    font-size: 12px;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-primary);
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-ghost:hover { background: var(--bg-secondary); }
  
  /* === 統計カード === */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--bg-card);
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .stat-card.alert { background: var(--danger-bg); border-color: #F0C8C8; }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-card.alert .stat-label { color: #791F1F; }
  .stat-value { font-size: 24px; font-weight: 500; }
  .stat-card.alert .stat-value { color: var(--danger-fg); }
  
  /* === フィルタ === */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 9px 14px;
    font-size: 13px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: white;
    color: var(--text-primary);
    font-family: inherit;
  }
  .search-box:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(46, 116, 181, 0.1);
  }
  
  /* === 工事一覧テーブル === */
  .list-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-card);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .list-table thead tr {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
  }
  .list-table th {
    text-align: left;
    padding: 11px 12px;
    font-weight: 500;
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .list-table td {
    padding: 13px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .list-table tr:last-child td { border-bottom: none; }
  .list-table tr.koji-row { cursor: pointer; transition: background 0.1s; }
  .list-table tr.koji-row:hover { background: var(--bg-secondary); }
  .list-table tr.koji-row.alert { background: #FCEBEB22; }
  .list-table tr.koji-row.alert:hover { background: #FCEBEB44; }
  
  .koji-num {
    color: var(--text-secondary);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
  }
  
  .s-pill {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    display: inline-block;
    white-space: nowrap;
  }
  .s-uketu { background: var(--warning-bg); color: var(--warning-fg); }
  .s-shiko { background: #E6F1FB; color: #0C447C; }
  .s-kanko { background: #E1F5EE; color: #085041; }
  
  .doc-dots {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
  }
  .doc-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 500;
  }
  .doc-dot.has { background: var(--success-bg); color: var(--success-fg); }
  .doc-dot.missing { background: var(--danger-bg); color: var(--danger-fg); }
  .doc-dot.fuyo { background: var(--neutral-bg); color: var(--neutral-fg); }
  
  .legend-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-secondary);
    flex-wrap: wrap;
  }
  .legend-row .doc-dot {
    width: 14px;
    height: 14px;
    font-size: 8px;
  }
  
  /* === モーダル === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal {
    background: var(--bg-card);
    border-radius: 12px;
    width: 100%;
    max-width: 880px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .modal-title { font-size: 18px; font-weight: 500; }
  .modal-tags {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .alert-pill {
    background: var(--danger-bg);
    color: #791F1F;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .modal-close {
    background: transparent;
    border: none;
    font-size: 24px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text-primary); }
  .modal-body { padding: 20px 24px; }
  
  .info-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .info-card {
    background: var(--bg-secondary);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .card-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .info-grid {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 6px 14px;
    font-size: 13px;
  }
  .info-grid .label { color: var(--text-secondary); }
  
  /* === 書類セクション === */
  .doc-section {
    background: var(--bg-secondary);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .doc-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .doc-section-title { font-size: 13px; font-weight: 500; }
  .doc-section-count { font-size: 11px; color: var(--text-secondary); }
  
  .doc-row {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    gap: 12px;
    background: var(--bg-card);
    border: 1px solid transparent;
  }
  .doc-row.has { border-color: #D0E3B8; }
  .doc-row.missing { background: #FCEBEB22; }
  
  .doc-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    flex-shrink: 0;
  }
  .doc-row.has .doc-icon { background: var(--success-bg); color: var(--success-fg); }
  .doc-row.missing .doc-icon { background: var(--danger-bg); color: var(--danger-fg); }
  
  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 13px; font-weight: 500; }
  .doc-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  
  .doc-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .icon-btn:hover { background: var(--bg-secondary); border-color: var(--text-secondary); }
  .icon-btn.primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .icon-btn.primary:hover { background: var(--primary-dark); }
  .icon-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .upload-btn-text {
    padding: 4px 12px;
    font-size: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .upload-btn-text:hover { background: var(--primary-dark); }
  
  .upload-input { display: none; }
  
  /* === フォーム === */
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    display: block;
  }
  .required-mark { color: #A32D2D; font-size: 11px; margin-left: 4px; }
  .optional-mark { color: var(--text-tertiary); font-size: 11px; margin-left: 4px; }
  .form-input {
    width: 100%;
    padding: 9px 12px;
    font-size: 13px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: white;
    color: var(--text-primary);
    font-family: inherit;
  }
  .form-input:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(46, 116, 181, 0.1);
  }
  .form-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  
  .info-banner {
    background: var(--warning-bg);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 18px;
    display: flex;
    gap: 8px;
    font-size: 11px;
    color: #633806;
    line-height: 1.5;
  }
  
  .form-buttons {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
  }
  
  /* === PDFプレビュー === */
  .pdf-modal {
    background: var(--bg-card);
    border-radius: 12px;
    width: 100%;
    max-width: 900px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
  }
  .pdf-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .pdf-title {
    font-size: 14px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 60%;
  }
  .pdf-actions { display: flex; gap: 6px; align-items: center; }
  .pdf-viewer-area {
    flex: 1;
    overflow: auto;
    padding: 20px;
    background: #4A4A48;
    text-align: center;
    min-height: 400px;
  }
  .pdf-viewer-area canvas {
    background: white;
    box-shadow: var(--shadow-lg);
    max-width: 100%;
    height: auto;
  }
  .pdf-controls {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 10px;
    align-items: center;
    font-size: 12px;
  }
  
  /* トースト通知 */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-8px);
  }
  .toast.error { background: #A32D2D; }
  
  /* === レスポンシブ === */
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .info-cards { grid-template-columns: 1fr; }
    .form-grid-2 { grid-template-columns: 1fr; }
    .container { padding: 16px 12px; }
    .list-table { font-size: 12px; }
    .list-table th { padding: 8px; font-size: 10px; }
    .list-table td { padding: 10px 8px; }
    .list-table th.hide-mobile,
    .list-table td.hide-mobile { display: none; }
    .modal { max-width: 100%; max-height: 95vh; }
    .modal-header, .modal-body { padding-left: 16px; padding-right: 16px; }
    .topbar { padding: 12px 16px; }
    .doc-actions { flex-wrap: wrap; gap: 4px; }
  }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- 起動中オーバーレイ -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">起動中...</div>
</div>

<!-- ヘッダー -->
<header class="topbar">
  <div>
    <h1>工事書類管理システム</h1>
    <div class="subtitle">業務用OneDrive 連携版</div>
  </div>
  <div class="user-info" id="user-info"></div>
</header>

<main class="container">

  <div class="header-row">
    <div>
      <div class="page-title">工事一覧</div>
      <div class="page-subtitle">2026年度</div>
    </div>
    <button class="btn-primary" onclick="openNewModal()">＋ 新規工事を追加</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">進行中</div>
      <div class="stat-value" id="stat-active">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">受注済</div>
      <div class="stat-value" id="stat-uketu">-</div>
    </div>
    <div class="stat-card alert">
      <div class="stat-label">書類不足</div>
      <div class="stat-value" id="stat-missing">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">完工</div>
      <div class="stat-value" id="stat-done">-</div>
    </div>
  </div>

  <div class="filter-row">
    <input type="text" class="search-box" id="search-input" placeholder="工事名・発注者・担当者で検索...">
    <button class="btn-ghost" onclick="refreshAllKoji()">🔄 更新</button>
  </div>

  <table class="list-table" id="koji-table">
    <thead>
      <tr>
        <th>工事名</th>
        <th class="hide-mobile">工事番号</th>
        <th>ステータス</th>
        <th>書類</th>
        <th class="hide-mobile">担当</th>
      </tr>
    </thead>
    <tbody id="koji-tbody"></tbody>
  </table>

  <div class="legend-row">
    <span>凡例:</span>
    <span><span class="doc-dot has">●</span> あり</span>
    <span><span class="doc-dot missing">●</span> なし</span>
    <span style="margin-left: auto; opacity: 0.7;">契=契約書 / 注=注文書 / 請=請書 / 台=工事台帳 / 求=請求書</span>
  </div>
</main>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="detail-title">工事名</div>
        <div class="modal-tags" id="detail-tags"></div>
      </div>
      <button class="modal-close" onclick="closeDetailModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="info-cards">
        <div class="info-card">
          <div class="card-label">工事情報</div>
          <div class="info-grid" id="detail-info"></div>
        </div>
        <div class="info-card">
          <div class="card-label">進捗</div>
          <div id="detail-timeline"></div>
        </div>
      </div>

      <div class="doc-section">
        <div class="doc-section-header">
          <div class="doc-section-title">書類管理</div>
          <div class="doc-section-count" id="doc-count"></div>
        </div>
        <div id="doc-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- 新規工事モーダル -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">新規工事を追加</div>
        <div class="page-subtitle" style="margin-top: 4px;">工事名さえあれば登録できます</div>
      </div>
      <button class="modal-close" onclick="closeNewModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="info-banner">
        <span>ℹ</span>
        <div>登録すると、業務用OneDriveの工事書類フォルダ内に工事フォルダが作成されます。工事名以外は後から追記できます。</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">工事名<span class="required-mark">必須</span></label>
        <input type="text" class="form-input" id="new-name" placeholder="例：○○橋梁補修工事">
      </div>

      <div class="form-grid-2">
        <div>

<input type="file" id="upload-input" class="upload-input" accept="application/pdf">

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 設定
// ============================================================
const CLIENT_ID = '6328b63a-6799-4aef-80a2-e3e6c190cc8b';
const TENANT_ID = 'cb8a44ea-32a2-48cb-9a9d-85be9107214f';

// 業務用アカウント（このアカウントのOneDriveを全員で共有して使う）
const SHARED_ACCOUNT = 'dgauser04@marubenishimada.onmicrosoft.com';
const ROOT_FOLDER = '工事書類';  // 業務用アカウントの OneDrive 上のフォルダ名
const KOJI_LIST_FILE = '_工事一覧.json';  // 工事一覧データを保存するJSONファイル

// 業務用アカウントの drive のIDをキャッシュ（起動時に取得）
let sharedDriveId = null;
// 業務用アカウントの「工事書類」フォルダのIDをキャッシュ
let sharedRootFolderId = null;

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: window.location.origin + window.location.pathname,
  },
  cache: {
    cacheLocation: 'sessionStorage',
    storeAuthStateInCookie: false,
  }
};

const scopes = ['Files.ReadWrite.All', 'User.Read'];

// PDF.js workerSrc - ローカル同梱版
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = './libs/pdf.worker.min.js';
}

// ============================================================
// グローバル状態
// ============================================================
const DOC_TYPES = [
  { key: 'keiyaku', label: '契約書', short: '契', filePrefix: '契約書' },
  { key: 'chumon', label: '注文書', short: '注', filePrefix: '注文書' },
  { key: 'uke',    label: '請書',   short: '請', filePrefix: '請書' },
  { key: 'daicho', label: '工事台帳', short: '台', filePrefix: '工事台帳' },
  { key: 'seikyu', label: '請求書', short: '求', filePrefix: '請求書' }
];

let msalInstance = null;
let accessToken = null;
let currentUser = null;
let kojiList = [];
let currentKojiId = null;
let currentDocKey = null;

// 工事フォルダのIDをキャッシュ
let kojiFolderIds = {};
// 各工事の書類有無 {kojiId-docKey: {fileId, fileName}}
let docFiles = {};

// PDFプレビュー用
let pdfDoc = null;
let pdfPageNum = 1;
let pdfPageRendering = false;
let pdfPageNumPending = null;
let currentPdfBlob = null;
let currentPdfName = '';

// ============================================================
// 起動
// ============================================================
window.addEventListener('load', async () => {
  try {
    await initialize();
  } catch (err) {
    showStartupError(err);
  }
});

async function initialize() {
  setLoading('Microsoft 認証を初期化中...');
  
  // MSAL.js 初期化
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();
  
  // リダイレクト処理
  const response = await msalInstance.handleRedirectPromise();
  if (response) {
    accessToken = response.accessToken;
    currentUser = response.account;
  } else {
    // 既存のアカウントを取得
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      msalInstance.setActiveAccount(accounts[0]);
      currentUser = accounts[0];
      // サイレントでトークン取得
      try {
        const silentResponse = await msalInstance.acquireTokenSilent({
          scopes: scopes,
          account: accounts[0]
        });
        accessToken = silentResponse.accessToken;
      } catch (err) {
        // サイレント失敗 → リダイレクト
        await msalInstance.acquireTokenRedirect({ scopes: scopes });
        return;
      }
    } else {
      // 未ログイン → リダイレクトでログイン
      setLoading('Microsoft 365 にログインします...');
      await msalInstance.loginRedirect({ scopes: scopes });
      return;
    }
  }
  
  // ユーザー情報表示
  document.getElementById('user-info').textContent = currentUser.name || currentUser.username;
  
  // OneDrive準備
  setLoading('業務用OneDriveに接続中...');
  await prepareOneDrive();
  
  // 工事一覧を読み込み
  setLoading('工事一覧を読み込み中...');
  await loadKojiList();
  
  // 各工事の書類状況を取得
  setLoading('書類状況を確認中...');
  await loadAllDocStatus();
  
  // 画面表示
  renderList();
  renderStats();
  
  // 起動完了
  document.getElementById('loading-overlay').classList.add('hidden');
}

function setLoading(text) {
  document.getElementById('loading-text').textContent = text;
}

function showStartupError(err) {
  console.error('起動エラー:', err);
  const overlay = document.getElementById('loading-overlay');
  overlay.innerHTML = `
    <div class="loading-error">
      <h3>⚠️ 起動エラー</h3>
      <p>システムの起動に失敗しました。以下のエラー情報を担当者に伝えてください。</p>
      <pre>${escapeHtml(err.message || String(err))}</pre>
    </div>
    <button class="retry-btn" onclick="location.reload()">再試行</button>
  `;
}

// ============================================================
// OneDrive API ラッパー
// ============================================================
async function ensureToken() {
  if (!accessToken) {
    const silentResponse = await msalInstance.acquireTokenSilent({
      scopes: scopes,
      account: currentUser
    });
    accessToken = silentResponse.accessToken;
  }
  return accessToken;
}

async function graphApi(method, path, body = null, isBlob = false) {
  await ensureToken();
  const headers = { 'Authorization': `Bearer ${accessToken}` };
  if (body && !(body instanceof Blob || body instanceof ArrayBuffer)) {
    headers['Content-Type'] = 'application/json';
    body = JSON.stringify(body);
  } else if (body instanceof Blob || body instanceof ArrayBuffer) {
    headers['Content-Type'] = 'application/pdf';
  }
  const url = path.startsWith('http') ? path : `https://graph.microsoft.com/v1.0${path}`;
  const res = await fetch(url, { method, headers, body });
  if (!res.ok) {
    if (res.status === 401) {
      accessToken = null;
      throw new Error('認証が切れました。ページを再読み込みしてください。');
    }
    const errText = await res.text();
    throw new Error(`API エラー (${res.status}): ${errText}`);
  }
  if (res.status === 204) return null;
  if (isBlob) return await res.blob();
  return await res.json();
}

// ============================================================
// 業務用OneDrive 接続準備
// ============================================================
// ベースAPIパスを取得（業務用アカウントの工事書類フォルダ）
function getBasePath() {
  if (!sharedDriveId || !sharedRootFolderId) {
    throw new Error('業務用OneDriveの準備が完了していません');
  }
  return `/drives/${sharedDriveId}/items/${sharedRootFolderId}`;
}

// 業務用アカウントのドライブIDを取得
async function fetchSharedDriveId() {
  try {
    const result = await graphApi('GET', `/users/${encodeURIComponent(SHARED_ACCOUNT)}/drive`);
    sharedDriveId = result.id;
    return sharedDriveId;
  } catch (err) {
    throw new Error(`業務用アカウント(${SHARED_ACCOUNT})のOneDriveにアクセスできません。\n` +
                    `権限の確認が必要です。エラー: ${err.message}`);
  }
}

// 業務用アカウントの「工事書類」フォルダIDを取得
async function fetchSharedRootFolderId() {
  if (!sharedDriveId) await fetchSharedDriveId();
  
  try {
    const result = await graphApi('GET', `/drives/${sharedDriveId}/root:/${encodeURIComponent(ROOT_FOLDER)}`);
    sharedRootFolderId = result.id;
    return sharedRootFolderId;
  } catch (err) {
    throw new Error(`業務用OneDriveに「${ROOT_FOLDER}」フォルダが見つかりません。\n` +
                    `事前に作成し、編集権限を付与してください。エラー: ${err.message}`);
  }
}

async function prepareOneDrive() {
  await fetchSharedDriveId();
  await fetchSharedRootFolderId();
}

// ============================================================
// 工事一覧の読み込み・保存
// ============================================================
async function loadKojiList() {
  try {
    // _工事一覧.json を取得（業務用ドライブの工事書類フォルダ直下）
    const fileInfo = await graphApi('GET', `/drives/${sharedDriveId}/items/${sharedRootFolderId}:/${encodeURIComponent(KOJI_LIST_FILE)}`);
    const blob = await graphApi('GET', `/drives/${sharedDriveId}/items/${fileInfo.id}/content`, null, true);
    const text = await blob.text();
    kojiList = JSON.parse(text);
  } catch (err) {
    // ファイルがなければ、サンプルデータで初期化
    kojiList = [
      {
        id: 'koji_' + Date.now() + '_1',
        name: '○○橋梁補修工事',
        number: 'K-2026-014',
        status: '完工',
        client: '国土交通省',
        sales: '山田 太郎',
        field: '田中 次郎',
        createdAt: new Date().toISOString()
      },
      {
        id: 'koji_' + Date.now() + '_2',
        name: '△△道路改良工事',
        number: 'K-2026-013',
        status: '施工中',
        client: '○○建設株式会社',
        sales: '池田 玲',
        field: '佐藤 健一',
        createdAt: new Date().toISOString()
      }
    ];
    await saveKojiList();
  }
}

async function saveKojiList() {
  const blob = new Blob([JSON.stringify(kojiList, null, 2)], { type: 'application/json' });
  // 業務用ドライブの工事書類フォルダ直下に保存
  await graphApi('PUT', `/drives/${sharedDriveId}/items/${sharedRootFolderId}:/${encodeURIComponent(KOJI_LIST_FILE)}:/content`, blob);
}

// ============================================================
// 工事フォルダ管理
// ============================================================
async function getOrCreateKojiFolder(koji) {
  if (kojiFolderIds[koji.id]) return kojiFolderIds[koji.id];
  
  const folderName = sanitizeFolderName(koji.name);
  
  try {
    // 業務用ドライブの工事書類フォルダ配下を探す
    const result = await graphApi('GET', `/drives/${sharedDriveId}/items/${sharedRootFolderId}:/${encodeURIComponent(folderName)}`);
    kojiFolderIds[koji.id] = result.id;
    return result.id;
  } catch (err) {
    // なければ作成
    const result = await graphApi('POST', `/drives/${sharedDriveId}/items/${sharedRootFolderId}/children`, {
      name: folderName,
      folder: {},
      '@microsoft.graph.conflictBehavior': 'rename'
    });
    kojiFolderIds[koji.id] = result.id;
    return result.id;
  }
}

function sanitizeFolderName(name) {
  // OneDriveで使えない文字を置換
  return name.replace(/[\\\/:\*\?"<>\|]/g, '_').trim();
}

// ============================================================
// 書類状況の取得
// ============================================================
async function loadAllDocStatus() {
  docFiles = {};
  for (const koji of kojiList) {
    await loadKojiDocStatus(koji);
  }
}

async function loadKojiDocStatus(koji) {
  try {
    const folderId = await getOrCreateKojiFolder(koji);
    const result = await graphApi('GET', `/drives/${sharedDriveId}/items/${folderId}/children`);
    
    for (const file of result.value) {
      for (const docType of DOC_TYPES) {
        if (file.name.startsWith(docType.filePrefix)) {
          const fileKey = `${koji.id}-${docType.key}`;
          docFiles[fileKey] = {
            fileId: file.id,
            fileName: file.name,
            size: file.size,
            modified: file.lastModifiedDateTime
          };
          break;
        }
      }
    }
  } catch (err) {
    console.error('書類読み込みエラー:', koji.name, err);
  }
}

// ============================================================
// 表示
// ============================================================
function getDocStatus(koji, docKey) {
  const fileKey = `${koji.id}-${docKey}`;
  return docFiles[fileKey] ? 'has' : 'missing';
}

function renderStats() {
  const active = kojiList.filter(k => k.status === '施工中').length;
  const uketu = kojiList.filter(k => k.status === '受注').length;
  const done = kojiList.filter(k => k.status === '完工').length;
  const missing = kojiList.filter(k => 
    DOC_TYPES.some(d => getDocStatus(k, d.key) === 'missing')
  ).length;
  
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-uketu').textContent = uketu;
  document.getElementById('stat-missing').textContent = missing;
  document.getElementById('stat-done').textContent = done;
}

function renderList() {
  const searchTerm = document.getElementById('search-input').value.toLowerCase();
  const filtered = kojiList.filter(k => {
    if (!searchTerm) return true;
    return (k.name || '').toLowerCase().includes(searchTerm) ||
           (k.client || '').toLowerCase().includes(searchTerm) ||
           (k.sales || '').toLowerCase().includes(searchTerm) ||
           (k.field || '').toLowerCase().includes(searchTerm);
  });
  
  const tbody = document.getElementById('koji-tbody');
  
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px 20px;color:var(--text-tertiary);">該当する工事がありません</td></tr>`;
    return;
  }
  
  tbody.innerHTML = filtered.map(k => {
    const hasMissing = DOC_TYPES.some(d => getDocStatus(k, d.key) === 'missing');
    const statusClass = k.status === '受注' ? 's-uketu' : k.status === '施工中' ? 's-shiko' : 's-kanko';
    
    const dotsHtml = DOC_TYPES.map(d => {
      const status = getDocStatus(k, d.key);
      return `<span class="doc-dot ${status}" title="${d.label}: ${status === 'has' ? 'あり' : 'なし'}">${d.short}</span>`;
    }).join('');
    
    return `
      <tr class="koji-row ${hasMissing ? 'alert' : ''}" onclick="openDetailModal('${k.id}')">
        <td style="font-weight:${hasMissing ? '500' : '400'};">${escapeHtml(k.name)}</td>
        <td class="hide-mobile"><span class="koji-num">${escapeHtml(k.number || '-')}</span></td>
        <td><span class="s-pill ${statusClass}">${escapeHtml(k.status || '')}</span></td>
        <td><div class="doc-dots">${dotsHtml}</div></td>
        <td class="hide-mobile" style="color:var(--text-secondary);font-size:12px;">${escapeHtml(k.field || '-')}</td>
      </tr>
    `;
  }).join('');
}

// ============================================================
// 詳細モーダル
// ============================================================
function openDetailModal(id) {
  currentKojiId = id;
  const koji = kojiList.find(k => k.id === id);
  if (!koji) return;
  
  document.getElementById('detail-title').textContent = koji.name;
  
  const missingCount = DOC_TYPES.filter(d => getDocStatus(koji, d.key) === 'missing').length;
  const statusClass = koji.status === '受注' ? 's-uketu' : koji.status === '施工中' ? 's-shiko' : 's-kanko';
  document.getElementById('detail-tags').innerHTML = `
    <span class="koji-num">${escapeHtml(koji.number || '-')}</span>
    <span class="s-pill ${statusClass}">${escapeHtml(koji.status || '')}</span>
    ${missingCount > 0 ? `<span class="alert-pill">⚠ 書類${missingCount}件不足</span>` : ''}
  `;
  
  document.getElementById('detail-info').innerHTML = `
    <div class="label">発注者</div><div>${escapeHtml(koji.client || '-')}</div>
    <div class="label">現場担当</div><div>${escapeHtml(koji.field || '-')}</div>
    <div class="label">営業担当</div><div>${escapeHtml(koji.sales || '-')}</div>
    <div class="label">登録日</div><div>${koji.createdAt ? new Date(koji.createdAt).toLocaleDateString('ja-JP') : '-'}</div>
  `;
  
  // 進捗タイムライン
  const statusOrder = ['受注', '施工中', '完工'];
  const currentIdx = statusOrder.indexOf(koji.status);
  const timeline = statusOrder.map((status, i) => {
    let cls = 'future';
    let icon = '○';
    if (i < currentIdx || (i === currentIdx && koji.status === '完工')) {
      cls = 'done'; icon = '✓';
    } else if (i === currentIdx) {
      cls = 'current'; icon = '●';
    }
    return `<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:8px;${cls === 'future' ? 'opacity:0.5;' : ''}">
      <span style="color:${cls === 'done' ? '#1D9E75' : cls === 'current' ? '#BA7517' : 'inherit'};font-weight:bold;">${icon}</span>
      ${cls === 'current' ? '<strong>' + status + '</strong>' : status}
    </div>`;
  }).join('');
  document.getElementById('detail-timeline').innerHTML = timeline;
  
  renderDocList(koji);
  
  const hasCount = DOC_TYPES.filter(d => getDocStatus(koji, d.key) === 'has').length;
  document.getElementById('doc-count').textContent = `${hasCount} / ${DOC_TYPES.length} 揃っています`;
  
  document.getElementById('detail-modal').classList.add('active');
}

function renderDocList(koji) {
  const html = DOC_TYPES.map(d => {
    const fileKey = `${koji.id}-${d.key}`;
    const file = docFiles[fileKey];
    const status = file ? 'has' : 'missing';
    const icon = file ? '✓' : '!';
    
    let subText = '未アップロード';
    if (file) {
      const sizeText = formatFileSize(file.size);
      const dateText = file.modified ? new Date(file.modified).toLocaleDateString('ja-JP') : '';
      subText = `${file.fileName} · ${sizeText}${dateText ? ' · ' + dateText : ''}`;
    }
    
    return `
      <div class="doc-row ${status}">
        <div class="doc-icon">${icon}</div>
        <div class="doc-info">
          <div class="doc-name">${d.label}</div>
          <div class="doc-sub">${escapeHtml(subText)}</div>
        </div>
        <div class="doc-actions">
          ${file ? `
            <button class="icon-btn" onclick="openPdfPreview('${koji.id}', '${d.key}')" title="プレビュー">👁</button>
            <button class="icon-btn" onclick="downloadFile('${koji.id}', '${d.key}')" title="ダウンロード">↓</button>
            <button class="icon-btn primary" onclick="triggerUpload('${koji.id}', '${d.key}')" title="差し替え">↑</button>
          ` : `
            <button class="upload-btn-text" onclick="triggerUpload('${koji.id}', '${d.key}')">↑ アップロード</button>
          `}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('doc-list').innerHTML = html;
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('active');
  currentKojiId = null;
}

// ============================================================
// ファイルアップロード
// ============================================================
function triggerUpload(kojiId, docKey) {
  currentKojiId = kojiId;
  currentDocKey = docKey;
  document.getElementById('upload-input').click();
}

document.getElementById('upload-input').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  if (file.type !== 'application/pdf') {
    showToast('PDFファイルのみアップロード可能です', 'error');
    e.target.value = '';
    return;
  }
  
  const koji = kojiList.find(k => k.id === currentKojiId);
  if (!koji) {
    e.target.value = '';
    return;
  }
  
  const docType = DOC_TYPES.find(d => d.key === currentDocKey);
  if (!docType) {
    e.target.value = '';
    return;
  }
  
  try {
    showToast('アップロード中...');
    
    // 工事フォルダを取得 or 作成
    const folderId = await getOrCreateKojiFolder(koji);
    
    // 古いファイルがあれば削除
    const oldFileKey = `${currentKojiId}-${currentDocKey}`;
    if (docFiles[oldFileKey]) {
      try {
        await graphApi('DELETE', `/drives/${sharedDriveId}/items/${docFiles[oldFileKey].fileId}`);
      } catch (err) {
        console.warn('古いファイルの削除に失敗:', err);
      }
    }
    
    // ファイル名を「種別_工事名_日時.pdf」形式に
    const timestamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const safeKojiName = sanitizeFolderName(koji.name);
    const newFileName = `${docType.filePrefix}_${safeKojiName}_${timestamp}.pdf`;
    
    // アップロード（業務用ドライブの工事フォルダに）
    const arrayBuffer = await file.arrayBuffer();
    const result = await graphApi('PUT', `/drives/${sharedDriveId}/items/${folderId}:/${encodeURIComponent(newFileName)}:/content`, arrayBuffer);
    
    // キャッシュ更新
    docFiles[oldFileKey] = {
      fileId: result.id,
      fileName: result.name,
      size: result.size,
      modified: result.lastModifiedDateTime
    };
    
    // 再描画
    renderDocList(koji);
    const hasCount = DOC_TYPES.filter(d => getDocStatus(koji, d.key) === 'has').length;
    document.getElementById('doc-count').textContent = `${hasCount} / ${DOC_TYPES.length} 揃っています`;
    
    const missingCount = DOC_TYPES.filter(d => getDocStatus(koji, d.key) === 'missing').length;
    const statusClass = koji.status === '受注' ? 's-uketu' : koji.status === '施工中' ? 's-shiko' : 's-kanko';
    document.getElementById('detail-tags').innerHTML = `
      <span class="koji-num">${escapeHtml(koji.number || '-')}</span>
      <span class="s-pill ${statusClass}">${escapeHtml(koji.status || '')}</span>
      ${missingCount > 0 ? `<span class="alert-pill">⚠ 書類${missingCount}件不足</span>` : ''}
    `;
    
    renderList();
    renderStats();
    
    showToast(`${docType.label}をアップロードしました`);
  } catch (err) {
    console.error('アップロードエラー:', err);
    showToast('アップロードに失敗しました: ' + err.message, 'error');
  }
  
  e.target.value = '';
});

// ============================================================
// ダウンロード
// ============================================================
async function downloadFile(kojiId, docKey) {
  const fileKey = `${kojiId}-${docKey}`;
  const file = docFiles[fileKey];
  if (!file) return;
  
  try {
    showToast('ダウンロード準備中...');
    const blob = await graphApi('GET', `/drives/${sharedDriveId}/items/${file.fileId}/content`, null, true);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = file.fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('ダウンロードしました');
  } catch (err) {
    console.error('ダウンロードエラー:', err);
    showToast('ダウンロードに失敗しました', 'error');
  }
}

// ============================================================
// PDFプレビュー
// ============================================================
async function openPdfPreview(kojiId, docKey) {
  const fileKey = `${kojiId}-${docKey}`;
  const file = docFiles[fileKey];
  if (!file) return;
  
  document.getElementById('pdf-title').textContent = file.fileName;
  document.getElementById('pdf-modal').classList.add('active');
  currentPdfName = file.fileName;
  
  try {
    showToast('PDFを読み込み中...');
    const blob = await graphApi('GET', `/drives/${sharedDriveId}/items/${file.fileId}/content`, null, true);
    currentPdfBlob = blob;
    
    const arrayBuffer = await blob.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument(new Uint8Array(arrayBuffer)).promise;
    pdfPageNum = 1;
    
    const controls = document.getElementById('pdf-controls');
    controls.style.display = pdfDoc.numPages > 1 ? 'flex' : 'none';
    
    renderPdfPage(pdfPageNum);
  } catch (err) {
    console.error('PDFの読み込みに失敗:', err);
    showToast('PDFの読み込みに失敗しました', 'error');
  }
}

async function renderPdfPage(num) {
  if (!pdfDoc) return;
  pdfPageRendering = true;
  
  try {
    const page = await pdfDoc.getPage(num);
    const viewerArea = document.getElementById('pdf-viewer-area');
    const maxWidth = viewerArea.clientWidth - 40;
    const baseViewport = page.getViewport({ scale: 1 });
    const scale = Math.min(2, maxWidth / baseViewport.width);
    
    const viewport = page.getViewport({ scale });
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    
    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    document.getElementById('pdf-page-info').textContent = `ページ ${num} / ${pdfDoc.numPages}`;
    
    pdfPageRendering = false;
    if (pdfPageNumPending !== null) {
      renderPdfPage(pdfPageNumPending);
      pdfPageNumPending = null;
    }
  } catch (err) {
    console.error('ページのレンダリングに失敗', err);
    pdfPageRendering = false;
  }
}

function queueRenderPage(num) {
  if (pdfPageRendering) pdfPageNumPending = num;
  else renderPdfPage(num);
}

function prevPage() {
  if (pdfPageNum <= 1) return;
  pdfPageNum--;
  queueRenderPage(pdfPageNum);
}

function nextPage() {
  if (!pdfDoc || pdfPageNum >= pdfDoc.numPages) return;
  pdfPageNum++;
  queueRenderPage(pdfPageNum);
}

function closePdfModal() {
  document.getElementById('pdf-modal').classList.remove('active');
  pdfDoc = null;
  currentPdfBlob = null;
}

function downloadCurrentPdf() {
  if (!currentPdfBlob) return;
  const url = URL.createObjectURL(currentPdfBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentPdfName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// 新規工事登録
// ============================================================
function openNewModal() {
  document.getElementById('new-name').value = '';
  document.getElementById('new-number').value = '';
  document.getElementById('new-client').value = '';
  document.getElementById('new-sales').value = '';
  document.getElementById('new-field').value = '';
  document.getElementById('new-status').value = '受注';
  document.getElementById('new-modal').classList.add('active');
  setTimeout(() => document.getElementById('new-name').focus(), 100);
}

function closeNewModal() {
  document.getElementById('new-modal').classList.remove('active');
}

async function saveNewKoji() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) {
    showToast('工事名は必須です', 'error');
    document.getElementById('new-name').focus();
    return;
  }
  
  const saveBtn = document.getElementById('save-new-btn');
  saveBtn.disabled = true;
  
  try {
    const newKoji = {
      id: 'koji_' + Date.now(),
      name: name,
      number: document.getElementById('new-number').value.trim(),
      status: document.getElementById('new-status').value,
      client: document.getElementById('new-client').value.trim(),
      sales: document.getElementById('new-sales').value.trim(),
      field: document.getElementById('new-field').value.trim(),
      createdAt: new Date().toISOString()
    };
    
    kojiList.unshift(newKoji);
    
    showToast('工事を登録中...');
    
    // OneDriveに工事フォルダ作成
    await getOrCreateKojiFolder(newKoji);
    
    // 工事一覧を保存
    await saveKojiList();
    
    closeNewModal();
    renderList();
    renderStats();
    
    showToast('工事を登録しました');
  } catch (err) {
    console.error('登録エラー:', err);
    showToast('登録に失敗しました: ' + err.message, 'error');
    // ロールバック
    kojiList = kojiList.filter(k => k.id !== ('koji_' + Date.now()));
  } finally {
    saveBtn.disabled = false;
  }
}

// 全件更新

async function refreshAllKoji() {
  try {
    showToast('更新中...');
    await loadKojiList();
    await loadAllDocStatus();
    renderList();
    renderStats();
    showToast('更新しました');
  } catch (err) {
    showToast('更新に失敗しました: ' + err.message, 'error');
  }
}

// ============================================================
// ユーティリティ
// ============================================================
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

let toastTimer = null;
function showToast(text, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.className = 'toast show' + (type ? ' ' + type : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.className = 'toast' + (type ? ' ' + type : '');
  }, 3000);
}

document.getElementById('search-input').addEventListener('input', renderList);

// モーダル外側クリックで閉じる
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  if (overlay.id === 'loading-overlay') return;
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
      overlay.classList.remove('active');
      if (overlay.id === 'pdf-modal') {
        pdfDoc = null;
        currentPdfBlob = null;
      }
    }
  });
});

// Escキーで閉じる
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => {
      if (m.id === 'loading-overlay') return;
      m.classList.remove('active');
      if (m.id === 'pdf-modal') {
        pdfDoc = null;
        currentPdfBlob = null;
      }
    });
  }
});
